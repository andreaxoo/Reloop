</head>

<body>

    </button>

    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav mx-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link active" href="accesorios.html">Accesorios</a></li>
            <li class="nav-item"><a class="nav-link" href="ropa.html">Ropa</a></li>
            <li class="nav-item"><a class="nav-link" href="promociones.html">Promociones</a></li>
        </ul>

        <form class="d-flex me-3">
            <input class="form-control me-2" type="search" placeholder="Buscar">
        </form>

        <div class="social-icons">
            <a href="mi-cuenta.html" class="btn btn-outline-success position-relative p-1" style="border: none;">
                <i class="fa-solid fa-user fs-5"></i>
            </a>    
            <a href="login.html" class="btn btn-outline-success position-relative p-1 ms-2" style="border: none;">

            </a>
            <a href="carrito.html" class="btn btn-outline-success position-relative p-1 ms-2" style="border: none;">
                <i class="fa-solid fa-basket-shopping fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="contador-carrito">0</span>
                </a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row">

        <aside class="col-lg-3 mb-4">
            <h5>Filtrar por:</h5>

            <p class="mt-3"><strong>Material</strong></p>
            <div><input type="checkbox" value="Mezclilla">Mezclilla</div>
            <div><input type="checkbox" value="Jeans">Jeans reciclados</div>
            <div><input type="checkbox" value="Corbata">Corbatas recicladas</div>
            <div><input type="checkbox" value="Seda">Tela de lona y seda</div>
            <div><input type="checkbox" value="Herrajes">Herrajes metálicos</div>
        </aside>

        <main class="col-lg-9">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <p id="resultados-text">resultados para ""</p>

                <select id="ordenar" class="form-select w-auto">
                    <option value="popular" >Más popular</option>
                    <option value="asc">Precio bajo</option>
                    <option value="desc">Precio alto</option>
                </select>
            </div>

            <div id="contenedor-accesorios" class="row gy-4 gy-xxl-5"></div>
            <div id="paginacion" class="text-center mt-4"></div>
        </main>

    </div>
</div>

<footer class="py-5">
    <div class="container d-flex flex-column flex-md-row justify-content-between">

        <div>
            <img src="logo.png" class="footer-logo mb-2">
            <p>¿Tienes alguna pregunta? ¡Contáctanos!</p>
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-pinterest"></i>
        </div>

        <div>
            <h5>Recibir ofertas</h5>
            <input class="form-control mb-2" placeholder="Tu correo">
            <button class="btn btn-light">Suscribirse</button>
        </div>

    </div>
</footer>

<div class="copy text-center p-2">
    © 2026 Reloop
</div>

<script>

let accesoriosGlobal = [];
let paginaActual = 1;
const productosPorPagina = 6;

document.addEventListener('DOMContentLoaded', ProcesarDatos);
    async function ProcesarDatos() {
    accesoriosGlobal = await ObtenerDatos();
    if (!accesoriosGlobal) return;
    PintarDatos(accesoriosGlobal);
    document.querySelectorAll('input[type="checkbox"]')
        .forEach(cb => {
            cb.addEventListener('change', AplicarFiltros);
        });
    }

function PintarDatos(accesorios){
    const inicio = (paginaActual - 1) * productosPorPagina;
    const fin = inicio + productosPorPagina;
    const accesoriosPagina = accesorios.slice(inicio, fin);
    let template = '';
    accesoriosPagina.forEach(item => {
        template += `
        <div class="col-12 col-md-6 col-lg-4 d-flex align-items-stretch">
            <article class="d-flex w-100 flex-column h-100">
                <div class="product-card w-100 d-flex flex-column h-100">

                    <a href="producto.html?id=${item.Id}&tipo=accesorios" class="text-decoration-none">
                        <div class="card-box mb-3">
                            <img src="img/${item.Imagen}" class="img-fluid" alt="${item.Nombre}">
                        </div>
                    </a>

                    <div class="p-2 d-flex flex-column flex-grow-1">
                        <p class="price">
                            <span class="new">$${item.Precio}</span>
                        </p>
                        <h3 class="h5 mb-2">${item.Nombre}</h3>
                        <p class="text-muted small mb-2">
                            ${item.Material}
                        </p>
                        <p class="card-text text-secondary mb-3">
                            ${item.Descripcion}
                        </p>
                        <button
                            class="btn btn-add w-100 mt-auto"
                            onclick="AgregarAlCarritoGlobal(
                                ${item.Id},
                                '${item.SKU}',
                                '${item.Nombre}',
                                ${item.Precio},
                                '${item.Imagen}'
                            )">

                            <i class="fa fa-cart-plus"></i>
                            Agregar
                        </button>
                    </div>
                </div>
            </article>
        </div>
        `;
    });
    document.getElementById('contenedor-accesorios').innerHTML = template;
    document.getElementById('resultados-text').textContent =
        `${accesorios.length} accesorios encontrados`;
    CrearPaginacion(accesorios.length);
}

function CrearPaginacion(total){
    const totalPaginas = Math.ceil(total / productosPorPagina);
    let html = '';
    for(let i = 1; i <= totalPaginas; i++){
        html += `
        <button
            class="btn btn-light m-1"
            onclick="CambiarPagina(${i})">
            ${i}
        </button>
        `;
    }
    document.getElementById('paginacion').innerHTML = html;
}

function CambiarPagina(numero){
    paginaActual = numero;
    PintarDatos(accesoriosGlobal);
}

function AplicarFiltros(){
    let productosFiltrados = [...accesoriosGlobal];
    const materialesSeleccionados =
        [...document.querySelectorAll('input[type="checkbox"]:checked')]
        .map(cb => cb.value);

    if(materialesSeleccionados.length > 0){
        productosFiltrados = productosFiltrados.filter(item =>
            materialesSeleccionados.some(material =>
                item.Material.toLowerCase()
                    .includes(material.toLowerCase())
            )
        );
    }
    paginaActual = 1;
    PintarDatos(productosFiltrados);
}

async function ObtenerDatos() {
    try {
        const respuesta = await fetch('./js/accesorios.json');
        const datos = await respuesta.json();
        return datos;

    } catch (error) {
        console.error('Error al obtener los datos:', error);
        alert('Error al obtener los datos. Revisa la consola.');
    }
}

</script>
</body>
</html>
