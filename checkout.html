<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Reloop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body{
            background:#f8f8f8;
        }

        .titulo-pedido{
            background:#5f6f52;
            color:white;
            padding:20px;
            font-weight:bold;
            border-radius:10px 10px 0 0;
        }

        .panel{
            background:white;
            border-radius:10px;
            padding:25px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

        .resumen{
            background:#f3f3f3;
            border-radius:10px;
            padding:25px;
            position:sticky;
            top:20px;
        }

        .btn-reloop{
            background:#a6b37d;
            border:none;
            color:#222;
            font-weight:600;
        }

        .btn-reloop:hover{
            background:#96a36e;
        }

        .producto-linea{
            display:flex;
            justify-content:space-between;
            margin-bottom:10px;
        }

        .total{
            color:#dc3545;
            font-weight:bold;
            font-size:1.2rem;
        }

        #paypal-button-container {
            display: none;
        }

        #paypal-button-container.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="titulo-pedido">
        <h2 class="m-0">CHECKOUT</h2>
    </div>

    <div class="bg-white p-4">

        <p class="text-muted">
            Inicio > Carrito > Información
        </p>

        <div class="row">

            <div class="col-lg-8">

                <div class="panel">

                    <h3 class="mb-4">Información de envío</h3>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label>Nombre*</label>
                            <input type="text" class="form-control" id="nombre">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Apellido*</label>
                            <input type="text" class="form-control" id="apellido">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Correo*</label>
                            <input type="email" class="form-control" id="correo">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Teléfono*</label>
                            <input type="text" class="form-control" id="telefono">
                        </div>

                        <div class="col-12 mb-3">
                            <label>Calle y Número</label>
                            <input type="text" class="form-control" id="calle">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Colonia</label>
                            <input type="text" class="form-control" id="colonia">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Municipio</label>
                            <input type="text" class="form-control" id="municipio">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Estado</label>
                            <select class="form-select" id="estado">
                                <option>Seleccionar estado</option>
                                <option>Aguascalientes</option>
                                <option>Baja California</option>
                                <option>CDMX</option>
                                <option>Jalisco</option>
                                <option>Nuevo León</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Código Postal</label>
                            <input type="text" class="form-control" id="cp">
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="resumen">

                    <h4 class="mb-4">
                        RESUMEN DEL PEDIDO
                    </h4>

                    <div id="productosResumen"></div>

                    <hr>

                    <div class="d-flex justify-content-between mb-2">
                        <strong>Subtotal</strong>
                        <strong id="subtotal">$0</strong>
                    </div>

                    <div class="d-flex justify-content-between mb-4">
                        <span class="total">Total</span>
                        <span class="total" id="totalPago">$0</span>
                    </div>

                    <button
                        id="btnConfirmar"
                        class="btn btn-reloop w-100 mb-3">
                        Confirmar Pedido
                    </button>

                    <div id="paypal-button-container"></div>

                    <a href="carrito.html"
                        class="btn btn-outline-secondary w-100 mt-3">
                        ← Volver al carrito
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
let total = 0;

async function cargarUsuario() {
    const respuesta = await fetch("api/obtenerUsuario.php");
    const usuario = await respuesta.json();

    if (usuario.success === false) {
        window.location = "login.html";
        return;
    }

    document.getElementById("nombre").value = usuario.nombre;
    document.getElementById("apellido").value = usuario.apellidos;
    document.getElementById("correo").value = usuario.correo;
    document.getElementById("telefono").value = usuario.telefono;
}

function actualizarResumen() {
    const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    const contenedor = document.getElementById("productosResumen");

    if (carrito.length === 0) {
        contenedor.innerHTML = `<p class="text-muted">No hay productos en el carrito.</p>`;
        total = 0;
        document.getElementById("subtotal").textContent = "$0";
        document.getElementById("totalPago").textContent = "$0";
        return;
    }

    let html = "";
    total = 0;

    carrito.forEach(item => {
        const subtotal = item.precio * item.cantidad;
        total += subtotal;

        html += `
            <div class="producto-linea">
                <span>${item.nombre} x${item.cantidad}</span>
                <span>$${subtotal.toFixed(2)}</span>
            </div>`;
    });

    contenedor.innerHTML = html;
    document.getElementById("subtotal").textContent = "$" + total.toFixed(2);
    document.getElementById("totalPago").textContent = "$" + total.toFixed(2);
}

async function enviarPedido() {
    const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    const totalPago = total.toFixed(2);

    const cliente = {
        nombre: document.getElementById("nombre").value,
        apellido: document.getElementById("apellido").value,
        correo: document.getElementById("correo").value,
        telefono: document.getElementById("telefono").value,
        calle: document.getElementById("calle").value,
        colonia: document.getElementById("colonia").value,
        municipio: document.getElementById("municipio").value,
        estado: document.getElementById("estado").value,
        cp: document.getElementById("cp").value
    };

    const respuesta = await fetch("api/guardarPedido.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            carrito,
            total: totalPago,
            cliente
        })
    });

    return await respuesta.json();
}

function validarDatos() {
    const nombre = document.getElementById("nombre").value.trim();
    const apellido = document.getElementById("apellido").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const calle = document.getElementById("calle").value.trim();
    const colonia = document.getElementById("colonia").value.trim();
    const municipio = document.getElementById("municipio").value.trim();
    const estado = document.getElementById("estado").value;
    const cp = document.getElementById("cp").value.trim();

    if (!nombre || !apellido || !telefono || !calle || !colonia || !municipio || estado === "Seleccionar estado" || !cp) {
        alert("Por favor completa todos los campos de envío.");
        return false;
    }

    return true;
}

function confirmarPedido() {
    if (!validarDatos()) {
        return;
    }
    
    // Mostrar botones de PayPal
    const container = document.getElementById("paypal-button-container");
    container.classList.add("show");
    
    // Scroll a los botones de PayPal
    container.scrollIntoView({ behavior: "smooth", block: "center" });
    
    // Desactivar botón Confirmar para evitar clics duplicados
    document.getElementById("btnConfirmar").disabled = true;
    document.getElementById("btnConfirmar").textContent = "Procede con PayPal abajo →";
}

document.addEventListener("DOMContentLoaded", function() {
    cargarUsuario();
    actualizarResumen();

    document.getElementById("btnConfirmar")
        .addEventListener("click", async function() {
            await confirmarPedido();
        });
});
</script>

<script src="https://www.paypal.com/sdk/js?client-id=AUkSxXwBmbFjkq3EsfagBLAOcphPe2HNJmP1mG42c62-aF7hepQh3gZKhOM68-g31YMDjIIpr1hQTsVe&currency=MXN"></script>

<script>
paypal.Buttons({
    createOrder(data, actions) {
        return actions.order.create({
            purchase_units: [{
                amount: {
                    value: total.toFixed(2)
                }
            }]
        });
    },
    onApprove(data, actions) {
        return actions.order.capture().then(async function() {
        try {

                const resultado = await enviarPedido();

                console.log(resultado);

                if(resultado.success){

                    localStorage.removeItem("carrito");

                    alert("Pago realizado correctamente");

                    window.location.href = "mi-cuenta.php";

                }else{

                    alert(
                        "Error: " +
                        JSON.stringify(resultado)
                    );
                }

            }catch(error){

                console.error(error);

                alert(
                    "Error JS: " +
                    error.message
                );
            }

            if(resultado.success) {
                localStorage.removeItem("carrito");
                alert("Pago realizado correctamente");
                window.location.href = "mi-cuenta.php";
            } else {
                console.error('guardarPedido error:', resultado);
                let extra = '';
                if(resultado.db_errors && Array.isArray(resultado.db_errors)){
                    try{ extra = '\nSQL errors: ' + JSON.stringify(resultado.db_errors); }catch(e){ extra = '\nSQL errors present'; }
                }
                alert((resultado.message || "No se pudo guardar el pedido.") + extra);
            }
        });
    }
}).render('#paypal-button-container');
</script>

</body>
</html>
