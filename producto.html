    <style>
        /* Ajustes exclusivos para que ninguna imagen se vuelva a aplastar */
        .product-img-container {
            width: 100%;
            /* Fuerza al contenedor a ser un cuadrado perfecto sin importar la pantalla */
            aspect-ratio: 1 / 1; 
            overflow: hidden;
            border-radius: 8px;
            background-color: #f8f9fa; /* Fondo gris claro por si acaso */
        }
        
        .product-img-detail {
            width: 100%;
            height: 100%;
            /* La magia: llena el cuadrado recortando proporcionalmente sin deformar */
            object-fit: cover; 
            /* Centra la imagen para que el recorte sea parejo */
            object-position: center; 
        }
    </style>
</head>

<script>
    document.addEventListener('DOMContentLoaded', CargarDetalle);

    async function CargarDetalle() {
        const params = new URLSearchParams(window.location.search);
        const idStr = params.get('id');
        const tipo = params.get('tipo');

        if (!idStr || !tipo) {
            window.location.href = 'index.html';
            return;
        }

        const id = parseInt(idStr);
        let rutaJson = `./js/${tipo}.json`;

        try {
            const respuesta = await fetch(rutaJson);
            const productos = await respuesta.json();
            
            const item = productos.find(p => (p.Id === id || p.id === id));

            if (!item) {
                document.getElementById('detalle-producto-container').innerHTML = `<div class="alert alert-warning text-center">Producto no encontrado.</div>`;
                return;
            }

            PintarDetalle(item);

        } catch (error) {
            console.error(error);
            document.getElementById('detalle-producto-container').innerHTML = `<div class="alert alert-danger text-center">Error al conectar con la base de datos.</div>`;
        }
    }

    function PintarDetalle(item) {
        const contenedor = document.getElementById('detalle-producto-container');
        
        const precioAnteriorHtml = item.Precio_Anterior ? `<span class="text-muted text-decoration-line-through fs-5 me-2">$${item.Precio_Anterior}</span>` : '';

        // Actualizamos el HTML inyectado para meter la imagen dentro de su nuevo contenedor cuadrado protegido
        contenedor.innerHTML = `
            <div class="col-12 col-md-6 mb-4">
                <div class="product-img-container shadow-sm">
                    <img src="img/${item.Imagen}" class="product-img-detail" alt="${item.Nombre}">
                </div>
            </div>
            <div class="col-12 col-md-6 d-flex flex-column justify-content-center px-4">
                <span class="badge bg-success mb-2 w-auto align-self-start">${item.Material || 'Upcycled Textile'}</span>
                <h1 class="fw-bold mb-3">${item.Nombre}</h1>
                <div class="mb-3">
                    <span class="text-success fs-3 fw-bold">$${item.Precio}</span>
                </div>
                <p class="text-secondary fs-5 mb-4">${item.Descripcion}</p>
                
                <div class="d-grid gap-2">
                    <button
                        class="btn btn-add w-100 mt-auto"
                        onclick="AgregarAlCarritoGlobal(
                            ${item.Id},
                            '${item.SKU}',
                            '${item.Nombre}',
                            ${item.Precio},
                            '${item.Imagen}'
                        )">

                        <i class="fa fa-cart-plus"></i>
                        Agregar
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm mt-2">Volver al catálogo</a>
                </div>
            </div>
        `;
    }

</script>
