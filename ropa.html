<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ropa - Reloop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light px-4">
    <img src="logo.png" class="logo me-2">
    <span class="brand-text">RE-LOOP</span>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav mx-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="accesorios.html">Accesorios</a></li>
            <li class="nav-item"><a class="nav-link active" href="ropa.html">Ropa</a></li>
            <li class="nav-item"><a class="nav-link" href="promociones.html">Promociones</a></li>
        </ul>

        <form class="d-flex me-3">
            <input class="form-control me-2" type="search" placeholder="Buscar">
        </form>

        <div class="social-icons">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-pinterest"></i>

            <a href="carrito.html" class="btn btn-outline-success position-relative p-1 ms-2" style="border: none;">
                <i class="fa-solid fa-basket-shopping fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="contador-carrito">0</span>
                </a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row">

        <aside class="col-lg-3 mb-4">
            <h5>Filtrar por:</h5>

            <p class="mt-3"><strong>Material</strong></p>
            <div><input type="checkbox" value="Mezclilla"> Mezclilla </div>
            <div><input type="checkbox" value="Algodón"> Algodón </div>
            <div><input type="checkbox" value="Popelina"> Popelina </div>
            <div><input type="checkbox" value="Varios"> Varios </div>
        </aside>

        <main class="col-lg-9">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <p id="resultados-text">resultados para ""</p>

               <select id="ordenar">
                    <option value="popular">Más popular</option>
                    <option value="asc">Precio bajo</option>
                    <option value="desc">Precio alto</option>
                </select>
            </div>

            <div id="contenedor-ropa" class="row gy-4 gy-xxl-5"></div>
            <div id="paginacion" class="text-center mt-4"></div>

        </main>

    </div>
</div>

<footer class="py-5">
    <div class="container d-flex flex-column flex-md-row justify-content-between">

        <div>
            <img src="logo.png" class="footer-logo mb-2">
            <p>¿Tienes alguna pregunta? ¡Contáctanos!</p>
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-pinterest"></i>
        </div>

        <div>
            <h5>Recibir ofertas</h5>
            <input class="form-control mb-2" placeholder="Tu correo">
            <button class="btn btn-light">Suscribirse</button>
        </div>

    </div>
</footer>

<div class="copy text-center p-2">
    © 2026 Reloop
</div>
<script>
let productosOriginales = [];
let paginaActual = 1;
const productosPorPagina = 6;

document.addEventListener('DOMContentLoaded', async () => {

    productosOriginales = await ObtenerDatos();

    document.querySelectorAll('input[type="checkbox"]')
        .forEach(c => c.addEventListener('change', AplicarFiltros));

    document.getElementById('ordenar')
        .addEventListener('change', AplicarFiltros);

    AplicarFiltros();
});

async function ObtenerDatos() {
    try {
        const respuesta = await fetch('./js/ropa.json');
        return await respuesta.json();
    } catch(error){
        console.error(error);
        return [];
    }
}

function AplicarFiltros(){

    const materiales = [...document.querySelectorAll('input[type="checkbox"]:checked')]
        .map(c => c.value);

    let resultado = [...productosOriginales];

    if(materiales.length > 0){
        resultado = resultado.filter(item =>
            materiales.some(material =>
                item.Material.toLowerCase().includes(material.toLowerCase())
            )
        );
    }

    const orden = document.getElementById('ordenar').value;

    if(orden === 'asc'){
        resultado.sort((a,b)=>a.Precio-b.Precio);
    }

    if(orden === 'desc'){
        resultado.sort((a,b)=>b.Precio-a.Precio);
    }

    PintarDatos(resultado);
}

function PintarDatos(productos){

    const inicio = (paginaActual - 1) * productosPorPagina;
    const fin = inicio + productosPorPagina;

    const productosPagina = productos.slice(inicio, fin);

    let template = '';

    productosPagina.forEach(item => {

        template += `
        <div class="col-12 col-md-6 col-lg-4 d-flex align-items-stretch">
            <article class="d-flex w-100 flex-column h-100">
                <div class="product-card w-100 d-flex flex-column h-100">

                    <a href="producto.html?id=${item.Id}&tipo=ropa" class="text-decoration-none">
                        <div class="card-box mb-3">
                            <img src="img/${item.Imagen}" class="img-fluid">
                        </div>
                    </a>

                    <div class="p-2 d-flex flex-column flex-grow-1">
                        <p class="price">
                            <span class="new">$${item.Precio}</span>
                        </p>

                        <h3 class="h5 mb-2">${item.Nombre}</h3>

                        <p class="text-muted small mb-2">
                            ${item.Material}
                        </p>

                        <p class="card-text text-secondary mb-3">
                            ${item.Descripcion}
                        </p>

                        <button class="btn btn-add w-100 mt-auto">
                            <i class="fa fa-cart-plus"></i> Agregar
                        </button>
                    </div>

                </div>
            </article>
        </div>
        `;
    });

    document.getElementById('contenedor-ropa').innerHTML = template;

    document.getElementById('resultados-text').textContent =
        `${productos.length} prendas encontradas`;

    CrearPaginacion(productos.length);
}

function CrearPaginacion(total){

    const totalPaginas =
        Math.ceil(total / productosPorPagina);

    let html = '';

    for(let i=1;i<=totalPaginas;i++){

        html += `
        <button
            class="btn btn-light m-1"
            onclick="CambiarPagina(${i})">
            ${i}
        </button>
        `;
    }

    document.getElementById('paginacion').innerHTML = html;
}

function CambiarPagina(numero){

    paginaActual = numero;
    AplicarFiltros();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/carrito.js"></script>
</body>
</html>
