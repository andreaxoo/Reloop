<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago - Reloop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

    <style>

        body{
            background:#f8f8f8;
        }

        .titulo-pedido{
            background:#5f6f52;
            color:white;
            padding:20px;
            font-weight:bold;
            border-radius:10px 10px 0 0;
        }

        .panel{
            background:white;
            border-radius:10px;
            padding:25px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

        .resumen{
            background:#f3f3f3;
            border-radius:10px;
            padding:25px;
            position:sticky;
            top:20px;
        }

        .btn-reloop{
            background:#a6b37d;
            border:none;
            color:#222;
            font-weight:600;
        }

        .btn-reloop:hover{
            background:#96a36e;
        }

        .producto-linea{
            display:flex;
            justify-content:space-between;
            margin-bottom:10px;
        }

        .total{
            color:#dc3545;
            font-weight:bold;
            font-size:1.2rem;
        }

    </style>
</head>

<body>

<div class="container py-5">

    <div class="titulo-pedido">
        <h2 class="m-0">PEDIDO</h2>
    </div>

    <div class="bg-white p-4">

        <p class="text-muted">
            Inicio > Carrito > Información
        </p>

        <div class="row">

            <div class="col-lg-8">

                <div class="panel">

                    <h3 class="mb-4">Información de envío</h3>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label>Nombre*</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Apellido*</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Correo*</label>
                            <input type="email" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Teléfono*</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col-12 mb-3">
                            <label>Calle y Número</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Colonia</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Municipio</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Estado</label>
                            <select class="form-select">
                                <option>Seleccionar estado</option>
                                <option>Aguascalientes</option>
                                <option>Baja California</option>
                                <option>CDMX</option>
                                <option>Jalisco</option>
                                <option>Nuevo León</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Código Postal</label>
                            <input type="text" class="form-control">
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-lg-4">

                <div class="resumen">

                    <h4 class="mb-4">
                        RESUMEN DEL PEDIDO
                    </h4>

                    <div id="productosResumen"></div>

                    <hr>

                    <div class="d-flex justify-content-between mb-2">
                        <strong>Subtotal</strong>
                        <strong id="subtotal">$0</strong>
                    </div>

                    <div class="d-flex justify-content-between mb-4">
                        <span class="total">Total</span>
                        <span class="total" id="totalPago">$0</span>
                    </div>

                    <button
                        class="btn btn-reloop w-100 mb-3">
                        Revisar Pedido
                    </button>

                    <div id="paypal-button-container"></div>

                    <a href="carrito.html"
                        class="btn btn-outline-secondary w-100 mt-3">
                        ← Volver al carrito
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

let total = 0;

document.addEventListener("DOMContentLoaded", ()=>{

    const carrito =
        JSON.parse(localStorage.getItem("carrito")) || [];

    const contenedor =
        document.getElementById("productosResumen");

    let html = "";

    carrito.forEach(item=>{

        const subtotal =
            item.precio * item.cantidad;

        total += subtotal;

        html += `
            <div class="producto-linea">
                <span>
                    ${item.nombre}
                    x${item.cantidad}
                </span>
                <span>
                    $${subtotal}
                </span>
            </div>
        `;
    });

    contenedor.innerHTML = html;

    document.getElementById("subtotal")
        .textContent = "$" + total.toFixed(2);

    document.getElementById("totalPago")
        .textContent = "$" + total.toFixed(2);
});

</script>

<script src="https://www.paypal.com/sdk/js?client-id=AUkSxXwBmbFjkq3EsfagBLAOcphPe2HNJmP1mG42c62-aF7hepQh3gZKhOM68-g31YMDjIIpr1hQTsVe&currency=MXN"></script>

<script>

paypal.Buttons({

    createOrder(data, actions){

        return actions.order.create({

            purchase_units:[{

                amount:{
                    value: total.toFixed(2)
                }

            }]
        });
    },

    onApprove(data, actions){

        return actions.order.capture().then(function(){

            localStorage.removeItem("carrito");

            window.location.href =
                "compra-exitosa.html";
        });
    }

}).render('#paypal-button-container');

</script>

</body>
</html>
