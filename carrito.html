    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light px-4">
    <img src="./img/logo.png" class="logo me-2">
    <span class="brand-text">RE-LOOP</span>
    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav mx-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="accesorios.html">Accesorios</a></li>
            <li class="nav-item"><a class="nav-link" href="ropa.html">Ropa</a></li>
            <li class="nav-item"><a class="nav-link" href="promociones.html">Promociones</a></li>
        </ul>
    </div>
    <div class="social-icons">
        <a href="mi-cuenta.php" id="btnPerfil" class="btn btn-outline-success position-relative p-1" style="border: none;">

        </a>
        <span id="usuarioNav" class="ms-2 align-middle d-none"></span>
        <button id="btnLogout" type="button" class="btn btn-outline-danger btn-sm ms-2 d-none">
            Cerrar sesión
        </button>

<div class="container py-5">
    <h2 class="fw-bold mb-4 text-white p-3 rounded" style="background-color: #4a6741;"><i class="fa-solid fa-basket-shopping me-2"></i>Tu Bolsa de Compra</h2>
    
    <div class="row">
        <div class="col-lg-8">
            <div class="card p-3 shadow-sm border-0 mb-4 bg-white">
                <div id="items-carrito">
                    </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-4 shadow-sm border-0" style="background-color: #f8f9fa;">
                <h4 class="fw-bold mb-3">Resumen del Pedido</h4>
                <hr>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span>
                    <span id="subtotal-carrito">$0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-3">
                    <span>Envío</span>
                    <span class="text-success fw-bold">Gratis</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4 fs-5 fw-bold">
                    <span>Total</span>
                    <span id="total-carrito" class="text-success">$0.00</span>
                </div>
                <a id="btnFinalizar" href="checkout.html" class="btn btn-success">
                Finalizar compra
                </a>
                <button class="btn btn-outline-danger w-100 btn-sm" onclick="VaciarCarrito()">Vaciar Carrito</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', RenderizarCarrito);

    function RenderizarCarrito() {
        const contenedor = document.getElementById('items-carrito');
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

        if (carrito.length === 0) {
            contenedor.innerHTML = `
                <div class="text-center py-5">
                    <p class="fs-4 text-muted">Tu carrito está vacío.</p>
                    <a href="ropa.html" class="btn btn-success">Ver Catálogo de Ropa</a>
                </div>`;
            ActualizarTotales(0);
            return;
        }

        let template = '';
        let totalGeneral = 0;

        carrito.forEach((item, index) => {
            let subtotalItem = item.precio * item.cantidad;
            totalGeneral += subtotalItem;

            template += `
                <div class="d-flex flex-column flex-md-row align-items-center justify-content-between border-bottom py-3">
                    <div class="d-flex align-items-center mb-2 mb-md-0">
                        <img src="img/${item.imagen}" alt="${item.nombre}" class="rounded me-3" style="width: 70px; height: 70px; object-fit: cover;">
                        <div>
                            <h6 class="fw-bold mb-1">${item.nombre}</h6>
                            <span class="text-success fw-bold">$${item.precio}</span>
                        </div>
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="me-3 text-muted">Cantidad: ${item.cantidad}</span>
                        <button class="btn btn-sm btn-outline-danger" onclick="EliminarItem(${index})"><i class="fa fa-trash"></i></button>
                    </div>
                </div>
            `;
        });

        contenedor.innerHTML = template;
        ActualizarTotales(totalGeneral);
    }

    function ActualizarTotales(total) {
        document.getElementById('subtotal-carrito').textContent = `$${total.toFixed(2)}`;
        document.getElementById('total-carrito').textContent = `$${total.toFixed(2)}`;
    }

    function EliminarItem(index) {
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        carrito.splice(index, 1);
        localStorage.setItem('carrito', JSON.stringify(carrito));
        RenderizarCarrito();
    }

    function VaciarCarrito() {
        localStorage.removeItem('carrito');
        RenderizarCarrito();
    }
</script>
<script>
// Fallback navigation: ensure Finalizar compra always navigates to checkout
document.addEventListener('DOMContentLoaded', function(){
    const btn = document.getElementById('btnFinalizar');
    if(btn){
        btn.addEventListener('click', function(e){
            // if some script prevented navigation, force it
            if(!(e.ctrlKey || e.metaKey)){
                window.location.href = 'checkout.html';
            }
        });
    }
});
</script>
<script>
async function cargarUsuarioNav() {
    const usuarioNav = document.getElementById("usuarioNav");
    const btnLogout = document.getElementById("btnLogout");
    const btnLogin = document.getElementById("btnLogin");

    if (!usuarioNav || !btnLogout || !btnLogin) {
        return;
    }

    try {
        const respuesta = await fetch("api/obtenerUsuario.php");
        const usuario = await respuesta.json();

        if (usuario.success === false) {
            usuarioNav.classList.add("d-none");
            btnLogout.classList.add("d-none");
            btnLogin.classList.remove("d-none");
            return;
        }

        usuarioNav.textContent = usuario.nombre;
        usuarioNav.classList.remove("d-none");
        btnLogout.classList.remove("d-none");
        btnLogin.classList.add("d-none");
    }
    catch (error) {
        console.error(error);
    }
}

document.addEventListener("DOMContentLoaded", function() {
    cargarUsuarioNav();

    const btnLogout = document.getElementById("btnLogout");
    if (btnLogout) {
        btnLogout.addEventListener("click", async function() {
            const respuesta = await fetch("api/logout.php");
            const datos = await respuesta.json();
            if (datos.success) {
                window.location = "index.html";
            }
        });
    }
});
</script>
</body>
</html>
