<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Carrito - Reloop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light px-4">
    <img src="logo.png" class="logo me-2">
    <span class="brand-text">RE-LOOP</span>
    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav mx-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="accesorios.html">Accesorios</a></li>
            <li class="nav-item"><a class="nav-link" href="ropa.html">Ropa</a></li>
            <li class="nav-item"><a class="nav-link" href="promociones.html">Promociones</a></li>
        </ul>
    </div>
    <div class="social-icons">
        <a href="mi-cuenta.html" class="btn btn-outline-success position-relative p-1" style="border: none;">
            <i class="fa-solid fa-user fs-5"></i>
        </a>    
        <a href="login.html" class="btn btn-outline-success position-relative p-1 ms-2" style="border: none;">
            <i class="fa-solid fa-right-to-bracket fs-5"></i>
        </a>
        <a href="carrito.html" class="btn btn-outline-success position-relative p-1 ms-2" style="border: none;">
            <i class="fa-solid fa-basket-shopping fs-5"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="contador-carrito">0</span>
        </a>
</nav>

<div class="container py-5">
    <h2 class="fw-bold mb-4 text-white p-3 rounded" style="background-color: #4a6741;"><i class="fa-solid fa-basket-shopping me-2"></i>Tu Bolsa de Compra</h2>
    
    <div class="row">
        <div class="col-lg-8">
            <div class="card p-3 shadow-sm border-0 mb-4 bg-white">
                <div id="items-carrito">
                    </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-4 shadow-sm border-0" style="background-color: #f8f9fa;">
                <h4 class="fw-bold mb-3">Resumen del Pedido</h4>
                <hr>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span>
                    <span id="subtotal-carrito">$0.00</span>
                </div>
                <div class="d-flex justify-content-between mb-3">
                    <span>Envío</span>
                    <span class="text-success fw-bold">Gratis</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4 fs-5 fw-bold">
                    <span>Total</span>
                    <span id="total-carrito" class="text-success">$0.00</span>
                </div>
                <a href="pago.html" class="btn btn-success">
                Finalizar compra
                </a>
                <button class="btn btn-outline-danger w-100 btn-sm" onclick="VaciarCarrito()">Vaciar Carrito</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', RenderizarCarrito);

    function RenderizarCarrito() {
        const contenedor = document.getElementById('items-carrito');
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

        if (carrito.length === 0) {
            contenedor.innerHTML = `
                <div class="text-center py-5">
                    <p class="fs-4 text-muted">Tu carrito está vacío.</p>
                    <a href="ropa.html" class="btn btn-success">Ver Catálogo de Ropa</a>
                </div>`;
            ActualizarTotales(0);
            return;
        }

        let template = '';
        let totalGeneral = 0;

        carrito.forEach((item, index) => {
            let subtotalItem = item.precio * item.cantidad;
            totalGeneral += subtotalItem;

            template += `
                <div class="d-flex flex-column flex-md-row align-items-center justify-content-between border-bottom py-3">
                    <div class="d-flex align-items-center mb-2 mb-md-0">
                        <img src="img/${item.imagen}" alt="${item.nombre}" class="rounded me-3" style="width: 70px; height: 70px; object-fit: cover;">
                        <div>
                            <h6 class="fw-bold mb-1">${item.nombre}</h6>
                            <span class="text-success fw-bold">$${item.precio}</span>
                        </div>
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="me-3 text-muted">Cantidad: ${item.cantidad}</span>
                        <button class="btn btn-sm btn-outline-danger" onclick="EliminarItem(${index})"><i class="fa fa-trash"></i></button>
                    </div>
                </div>
            `;
        });

        contenedor.innerHTML = template;
        ActualizarTotales(totalGeneral);
    }

    function ActualizarTotales(total) {
        document.getElementById('subtotal-carrito').textContent = `$${total.toFixed(2)}`;
        document.getElementById('total-carrito').textContent = `$${total.toFixed(2)}`;
    }

    function EliminarItem(index) {
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        carrito.splice(index, 1);
        localStorage.setItem('carrito', JSON.stringify(carrito));
        RenderizarCarrito();
    }

    function VaciarCarrito() {
        localStorage.removeItem('carrito');
        RenderizarCarrito();
    }
</script>
</body>
</html>
